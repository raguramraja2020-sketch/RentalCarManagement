<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Valparai Car Rentals</title>
<!-- Google Fonts for a modern look -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet" />
<style>
  /* Reset some default styles */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Montserrat', sans-serif;
    background: linear-gradient(135deg, #74ebd5 0%, #ACB6E5 100%);
    color: #333;
    line-height: 1.6;
  }

  /* Navigation styling */
  nav {
    background-color: rgba(255,255,255,0.9);
    padding: 20px 40px;
    position: sticky;
    top: 0;
    z-index: 1000;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  }

  nav ul {
    list-style: none;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
  }

  nav ul li {
    margin: 0 20px;
  }

  nav ul li a {
    text-decoration: none;
    font-weight: 600;
    font-size: 18px;
    color: #333;
    padding: 8px 16px;
    border-radius: 8px;
    transition: background 0.3s, color 0.3s;
  }

  nav ul li a:hover {
    background-color: #333;
    color: #fff;
  }

  /* Header */
  h1 {
    text-align: center;
    margin: 50px 20px 20px 20px;
    font-size: 3em;
    color: #fff;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
  }

  p {
    text-align: center;
    font-size: 1.2em;
    margin: 20px auto;
    max-width: 800px;
    padding: 0 20px;
  }

  /* Call to action button */
  .btn {
    display: inline-block;
    background-color: #ff6f61;
    color: #fff;
    padding: 14px 28px;
    margin: 30px auto;
    display: block;
    font-size: 1.2em;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    text-decoration: none;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    transition: background-color 0.3s, transform 0.2s;
  }

  .btn:hover {
    background-color: #ff3b2e;
    transform: translateY(-2px);
  }

  /* Responsive layout */
  @media(max-width: 768px) {
    nav ul {
      flex-direction: column;
    }
    h1 {
      font-size: 2.2em;
    }
  }
</style>
</head>
<body>

<!-- Navigation -->
<nav>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="available-cars.html">Cars</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<h1>Welcome to Valparai Car Rentals</h1>
<p>Your trusted car rental service in Valparai. Explore our fleet of the best vehicles and enjoy a comfortable ride in the beautiful hill station.</p>
<a href="available-cars.html" class="btn">View Available Cars</a>

</body>
</html>
