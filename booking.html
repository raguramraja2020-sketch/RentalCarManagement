<section class="booking">

    <div class="booking-box">

        <h1>Book Your Car</h1>

        <form>

            <input type="text"
                   placeholder="Enter Your Name"
                   required>

            <input type="tel"
                   placeholder="Enter Phone Number"
                   required>

            <select required>
                <option>Select Car</option>
                <option>Honda Amaze</option>
                <option>Toyota Etios</option>
                <option>Hyundai i10</option>
                <option>Tata Indica</option>
                <option>Toyota Innova</option>
                <option>Maruti Omni</option>
                <option>Mahindra Scorpio</option>
            </select>

            <input type="date" required>
            <input type="date" required>

            <button type="submit">
                Confirm Booking
            </button>

        </form>

    </div>

</section>

</body>
